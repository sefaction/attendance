services:
  attendance:
    build:
      context: .
      dockerfile: Dockerfile
    image: attendance-tracker:latest
    container_name: ${CONTAINER_NAME:-attendance-tracker}
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      ATTENDANCE_DB: ${ATTENDANCE_DB:-/data/attendance.db}
      PORT: 8080
    volumes:
      - ${APPDATA_PATH:-./appdata}:/data
    restart: unless-stopped
